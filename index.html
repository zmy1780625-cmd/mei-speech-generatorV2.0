<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>梅总 · 演讲稿生成器</title>
<!-- Lucide Icons -->
<script src="https://unpkg.com/lucide@latest"></script>
<style>
  :root {
    --blue-deep: #0052D9;
    --blue-mid: #1677FF;
    --blue-light: #E6F4FF;
    --blue-bg: #F0F7FF;
    --indigo: #4338CA;
    --purple: #7C3AED;
    --gold: #D4A843;
    --dark: #1D2129;
    --gray-text: #4E5969;
    --gray-light: #C9CDD4;
    --white: #FFFFFF;
    --bg: #F3F4F8;
    --shadow: 0 2px 16px rgba(0,40,120,0.07);
    --shadow-lg: 0 8px 32px rgba(0,40,120,0.10);
    --radius: 14px;
    --glass-bg: rgba(255,255,255,0.65);
    --glass-border: rgba(255,255,255,0.25);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", sans-serif;
    color: var(--dark);
    min-height: 100vh;
    /* 微妙网格纹理背景 */
    background-color: #F3F4F8;
    background-image:
      linear-gradient(rgba(0,82,217,0.02) 1px, transparent 1px),
      linear-gradient(90deg, rgba(0,82,217,0.02) 1px, transparent 1px);
    background-size: 32px 32px;
  }

  /* ========== Header: 毛玻璃 + 渐变 ========== */
  .header {
    background: linear-gradient(135deg, #0F2847 0%, #1E3A6E 25%, #2E4A8E 50%, #4338CA 75%, #6D28D9 100%);
    padding: 26px 40px;
    position: sticky;
    top: 0;
    z-index: 100;
    backdrop-filter: blur(20px) saturate(180%);
    -webkit-backdrop-filter: blur(20px) saturate(180%);
    border-bottom: 1px solid rgba(255,255,255,0.08);
    box-shadow: 0 4px 30px rgba(0,0,0,0.15);
  }
  .header::before {
    content: '';
    position: absolute;
    inset: 0;
    background: radial-gradient(ellipse at 80% 20%, rgba(124,58,237,0.25) 0%, transparent 60%),
                radial-gradient(ellipse at 20% 80%, rgba(22,119,255,0.15) 0%, transparent 60%);
    pointer-events: none;
  }
  .header-inner {
    max-width: 1280px;
    margin: 0 auto;
    position: relative;
    z-index: 1;
    display: flex;
    align-items: center;
    gap: 14px;
  }
  .header-logo {
    width: 42px; height: 42px;
    background: rgba(255,255,255,0.12);
    border-radius: 12px;
    display: flex; align-items: center; justify-content: center;
    border: 1px solid rgba(255,255,255,0.15);
    flex-shrink: 0;
  }
  .header-logo i { color: rgba(255,255,255,0.9); }
  .header h1 {
    color: var(--white);
    font-size: 22px;
    font-weight: 700;
    letter-spacing: 0.5px;
  }

  /* ========== Main layout ========== */
  .main {
    max-width: 1280px;
    margin: 0 auto;
    padding: 28px 40px 40px;
    display: grid;
    grid-template-columns: 400px 1fr;
    gap: 28px;
  }

  /* ========== Left panel: 深色区块 ========== */
  .left-panel {
    display: flex;
    flex-direction: column;
    gap: 20px;
  }

  /* ========== Cards: 毛玻璃 ========== */
  .card {
    background: var(--glass-bg);
    backdrop-filter: blur(16px) saturate(160%);
    -webkit-backdrop-filter: blur(16px) saturate(160%);
    border-radius: var(--radius);
    box-shadow: var(--shadow);
    border: 1px solid rgba(255,255,255,0.5);
    padding: 24px;
    transition: box-shadow 0.3s;
  }
  .card:hover { box-shadow: var(--shadow-lg); }

  .card-dark {
    background: linear-gradient(135deg, #0F1B2D 0%, #152238 50%, #1A2744 100%);
    border: 1px solid rgba(255,255,255,0.06);
    color: #E2E8F0;
  }
  .card-dark .card-title { color: #E2E8F0; }
  .card-dark .card-title::before { background: #818CF8; }
  .card-dark .form-label { color: #94A3B8; }
  .card-dark .form-label .hint { color: #64748B; }
  .card-dark input, .card-dark textarea, .card-dark select {
    background: rgba(255,255,255,0.06);
    border-color: rgba(255,255,255,0.10);
    color: #E2E8F0;
  }
  .card-dark input:focus, .card-dark textarea:focus {
    border-color: #818CF8;
    box-shadow: 0 0 0 3px rgba(129,140,248,0.15);
  }
  .card-dark input::placeholder, .card-dark textarea::placeholder { color: #64748B; }

  .card-title {
    font-size: 15px;
    font-weight: 600;
    color: var(--dark);
    margin-bottom: 20px;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .card-title::before {
    content: '';
    width: 4px;
    height: 16px;
    background: var(--blue-deep);
    border-radius: 2px;
    display: inline-block;
  }
  .card-title i { width: 18px; height: 18px; }

  /* ========== Form ========== */
  .form-group { margin-bottom: 18px; }
  .form-label {
    display: block;
    font-size: 12px;
    font-weight: 600;
    color: var(--gray-text);
    margin-bottom: 6px;
    letter-spacing: 0.3px;
  }
  .form-label .hint {
    font-weight: 400;
    color: var(--gray-light);
    font-size: 11px;
    margin-left: 4px;
  }
  input[type="text"], textarea, select {
    width: 100%;
    padding: 10px 14px;
    border: 1px solid #E5E6EB;
    border-radius: 8px;
    font-size: 13px;
    font-family: inherit;
    color: var(--dark);
    transition: border-color 0.2s, box-shadow 0.2s;
    background: var(--white);
  }
  input:focus, textarea:focus, select:focus {
    outline: none;
    border-color: var(--blue-mid);
    box-shadow: 0 0 0 3px rgba(22,119,255,0.08);
  }
  textarea { resize: vertical; line-height: 1.6; }

  /* ========== Occasion pills: 线性图标 ========== */
  .occasion-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 8px;
  }
  .occasion-pill {
    padding: 12px 10px;
    border: 1.5px solid rgba(255,255,255,0.10);
    border-radius: 10px;
    font-size: 12px;
    text-align: center;
    cursor: pointer;
    transition: all 0.25s;
    background: rgba(255,255,255,0.04);
    color: #94A3B8;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 6px;
  }
  .occasion-pill i { width: 20px; height: 20px; stroke-width: 1.5; }
  .occasion-pill:hover {
    border-color: #818CF8;
    color: #C7D2FE;
    background: rgba(129,140,248,0.08);
  }
  .occasion-pill.active {
    border-color: #818CF8;
    background: linear-gradient(135deg, rgba(99,102,241,0.2), rgba(124,58,237,0.15));
    color: #E0E7FF;
    font-weight: 600;
    box-shadow: 0 0 20px rgba(129,140,248,0.15);
  }

  /* ========== Structure pills ========== */
  .struct-options {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
  }
  .struct-pill {
    padding: 6px 14px;
    border: 1.5px solid rgba(255,255,255,0.10);
    border-radius: 20px;
    font-size: 11px;
    cursor: pointer;
    transition: all 0.2s;
    background: transparent;
    color: #94A3B8;
    display: flex;
    align-items: center;
    gap: 4px;
  }
  .struct-pill i { width: 13px; height: 13px; stroke-width: 1.5; }
  .struct-pill:hover { border-color: #818CF8; color: #C7D2FE; }
  .struct-pill.active {
    border-color: #818CF8;
    background: rgba(129,140,248,0.12);
    color: #C7D2FE;
    font-weight: 600;
  }

  /* ========== Slider ========== */
  .slider-row {
    display: flex;
    align-items: center;
    gap: 12px;
  }
  .slider-row input[type="range"] {
    flex: 1;
    -webkit-appearance: none;
    height: 5px;
    border-radius: 3px;
    background: rgba(255,255,255,0.10);
    outline: none;
    border: none;
    padding: 0;
  }
  .slider-row input[type="range"]::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 16px; height: 16px;
    border-radius: 50%;
    background: #818CF8;
    cursor: pointer;
    box-shadow: 0 0 8px rgba(129,140,248,0.5);
  }
  .word-count-display {
    font-size: 14px;
    font-weight: 700;
    color: #818CF8;
    min-width: 55px;
    text-align: right;
  }

  /* ========== Generate button ========== */
  .btn-generate {
    width: 100%;
    padding: 14px;
    background: linear-gradient(135deg, #4338CA, #6D28D9, #7C3AED);
    color: var(--white);
    border: none;
    border-radius: 10px;
    font-size: 14px;
    font-weight: 700;
    cursor: pointer;
    transition: all 0.3s;
    letter-spacing: 0.5px;
    position: relative;
    overflow: hidden;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
  }
  .btn-generate::before {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(135deg, transparent 40%, rgba(255,255,255,0.1) 50%, transparent 60%);
    transform: translateX(-100%);
    transition: transform 0.6s;
  }
  .btn-generate:hover::before { transform: translateX(100%); }
  .btn-generate:hover { box-shadow: 0 4px 24px rgba(99,102,241,0.4); transform: translateY(-1px); }
  .btn-generate:active { transform: translateY(0); }
  .btn-generate:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }
  .btn-generate .spinner {
    display: none;
    width: 16px; height: 16px;
    border: 2px solid rgba(255,255,255,0.3);
    border-top-color: white;
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* ========== Right panel ========== */
  .right-panel { display: flex; flex-direction: column; gap: 20px; }

  /* ========== Preview ========== */
  .preview-card {
    flex: 1;
    min-height: 520px;
    display: flex;
    flex-direction: column;
  }
  .preview-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 16px;
  }
  .preview-actions { display: flex; gap: 8px; }
  .btn-action {
    padding: 6px 14px;
    border: 1.5px solid #E5E6EB;
    border-radius: 8px;
    background: var(--white);
    font-size: 11px;
    color: var(--gray-text);
    cursor: pointer;
    transition: all 0.2s;
    font-family: inherit;
    display: flex;
    align-items: center;
    gap: 5px;
  }
  .btn-action i { width: 13px; height: 13px; }
  .btn-action:hover { border-color: var(--indigo); color: var(--indigo); }

  .preview-content {
    flex: 1;
    padding: 28px 32px;
    background: rgba(250,251,253,0.8);
    border: 1px solid rgba(0,0,0,0.04);
    border-radius: 10px;
    overflow-y: auto;
    line-height: 1.85;
    font-size: 14.5px;
    color: var(--dark);
    position: relative;
  }
  .preview-content .placeholder {
    position: absolute;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    text-align: center;
    color: var(--gray-light);
  }
  .placeholder-icon { margin-bottom: 12px; }
  .placeholder-icon i { width: 48px; height: 48px; stroke-width: 1; color: #C9CDD4; }
  .placeholder-text { font-size: 13px; line-height: 1.6; }

  .preview-content h1 { font-size: 21px; text-align: center; margin-bottom: 4px; color: var(--dark); }
  .preview-content .subtitle { text-align: center; color: var(--gray-text); font-size: 13px; margin-bottom: 24px; padding-bottom: 20px; border-bottom: 1px solid #F0F0F0; }
  .preview-content p { margin-bottom: 13px; text-indent: 2em; }
  .preview-content p.no-indent { text-indent: 0; }
  .preview-content .section-break { margin: 20px 0; text-align: center; color: var(--gray-light); letter-spacing: 4px; }
  .preview-content strong { color: var(--indigo); }
  .preview-content .signature { text-align: right; margin-top: 32px; padding-top: 16px; border-top: 1px solid #F0F0F0; color: var(--gray-text); font-size: 13px; font-style: italic; }

  /* Stats bar */
  .stats-bar {
    display: flex;
    gap: 20px;
    padding: 12px 0 0;
    border-top: 1px solid rgba(0,0,0,0.04);
    margin-top: 12px;
  }
  .stat-item {
    font-size: 11px;
    color: var(--gray-text);
    display: flex;
    align-items: center;
    gap: 4px;
  }
  .stat-item i { width: 13px; height: 13px; color: var(--indigo); }
  .stat-item .num { font-weight: 700; color: var(--indigo); }

  /* ========== 交互修改面板 ========== */
  .modify-card {
    animation: slideUp 0.4s ease-out;
  }
  @keyframes slideUp {
    from { opacity: 0; transform: translateY(20px); }
    to { opacity: 1; transform: translateY(0); }
  }
  .modify-chat {
    max-height: 320px;
    overflow-y: auto;
    padding: 12px;
    background: rgba(250,251,253,0.8);
    border: 1px solid rgba(0,0,0,0.04);
    border-radius: 10px;
    margin-bottom: 12px;
    display: flex;
    flex-direction: column;
    gap: 10px;
  }
  .modify-msg {
    padding: 10px 14px;
    border-radius: 10px;
    font-size: 13px;
    line-height: 1.6;
    max-width: 88%;
  }
  .modify-msg.user {
    background: linear-gradient(135deg, #4338CA, #6D28D9);
    color: white;
    align-self: flex-end;
    border-bottom-right-radius: 4px;
  }
  .modify-msg.assistant {
    background: white;
    color: var(--dark);
    align-self: flex-start;
    border: 1px solid #E5E6EB;
    border-bottom-left-radius: 4px;
  }
  .modify-msg .msg-label {
    font-size: 10px;
    font-weight: 600;
    margin-bottom: 4px;
    opacity: 0.7;
  }
  .modify-input-area {
    display: flex;
    gap: 8px;
    align-items: flex-end;
  }
  .modify-input-area textarea {
    flex: 1;
    resize: none;
    min-height: 42px;
  }
  .btn-modify {
    padding: 10px 18px;
    background: linear-gradient(135deg, #4338CA, #6D28D9);
    color: white;
    border: none;
    border-radius: 8px;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.3s;
    display: flex;
    align-items: center;
    gap: 6px;
    white-space: nowrap;
  }
  .btn-modify:hover { box-shadow: 0 4px 16px rgba(99,102,241,0.3); }
  .btn-modify:disabled { opacity: 0.5; cursor: not-allowed; }
  .spinner-modify {
    width: 14px; height: 14px;
    border: 2px solid rgba(255,255,255,0.3);
    border-top-color: white;
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
    display: inline-block;
  }

  /* ========== Responsive ========== */
  @media (max-width: 960px) {
    .main { grid-template-columns: 1fr; padding: 16px; }
    .header { padding: 18px 20px; }
    .dna-group-cards { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>

<!-- Header: 毛玻璃+渐变 -->
<div class="header">
  <div class="header-inner">
    <div class="header-logo"><i data-lucide="mic" style="width:22px;height:22px;"></i></div>
    <h1>梅总 · 演讲稿生成器</h1>
  </div>
</div>

<!-- Main -->
<div class="main">
  <!-- Left: 深色配置面板 -->
  <div class="left-panel">
    <div class="card card-dark">
      <div class="card-title"><i data-lucide="settings-2"></i> 演讲配置</div>

      <!-- 场合 -->
      <div class="form-group">
        <div class="form-label">场合类型</div>
        <div class="occasion-grid" id="occasionGrid">
          <div class="occasion-pill active" data-val="conference">
            <i data-lucide="globe"></i>全球大会
          </div>
          <div class="occasion-pill" data-val="partner">
            <i data-lucide="handshake"></i>伙伴大会
          </div>
          <div class="occasion-pill" data-val="university">
            <i data-lucide="graduation-cap"></i>高校发布会
          </div>
          <div class="occasion-pill" data-val="seminar">
            <i data-lucide="book-open"></i>学术研讨会
          </div>
        </div>
      </div>

      <!-- 活动全称 -->
      <div class="form-group">
        <div class="form-label">活动全称 <span class="hint">选填，用于开场致辞场景</span></div>
        <input type="text" id="eventName" placeholder="例：2026数字设计创新峰会启动会">
      </div>

      <!-- 演讲主题 -->
      <div class="form-group">
        <div class="form-label">演讲主题 <span class="hint">选填，用于主题演讲场景</span></div>
        <input type="text" id="topic" placeholder="例：AIGC赋能数字化设计变革">
        <div style="font-size:11px;color:#64748B;margin-top:4px;">💡 活动全称与演讲主题至少填写一项</div>
      </div>

      <!-- 称呼 -->
      <div class="form-group">
        <div class="form-label">现场听众称呼 <span class="hint">选填</span></div>
        <input type="text" id="audience" placeholder="例：各位专家、各位校长、老师们">
      </div>

      <!-- 论述结构 -->
      <div class="form-group">
        <div class="form-label">论述结构</div>
        <div class="struct-options" id="structOptions">
          <div class="struct-pill active" data-val="policy"><i data-lucide="landmark"></i> 政策呼应</div>
          <div class="struct-pill" data-val="review"><i data-lucide="bar-chart-3"></i> 成果回顾</div>
          <div class="struct-pill" data-val="product"><i data-lucide="rocket"></i> 产品发布</div>
          <div class="struct-pill" data-val="collab"><i data-lucide="users"></i> 合作描述</div>
          <div class="struct-pill" data-val="vision"><i data-lucide="telescope"></i> 战略展望</div>
        </div>
      </div>

      <!-- 补充要点 -->
      <div class="form-group">
        <div class="form-label">补充要点 <span class="hint">选填</span></div>
        <textarea id="extras" rows="2" placeholder="如合作方名称、发布产品等"></textarea>
      </div>

      <!-- 字数 -->
      <div class="form-group">
        <div class="form-label">目标字数</div>
        <div class="slider-row">
          <input type="range" id="wordCount" min="600" max="2000" step="100" value="1000">
          <span class="word-count-display" id="wordCountDisplay">1000字</span>
        </div>
      </div>

      <!-- 模型选择 -->
      <div class="form-group">
        <div class="form-label">AI 模型 <span class="hint"><a href="#" onclick="manageApiKey();return false;" style="color:#818CF8;text-decoration:none;">配置 Key</a></span></div>
        <select id="modelSelect" onchange="switchModel(this.value)" style="background:rgba(255,255,255,0.06);border-color:rgba(255,255,255,0.10);color:#E2E8F0;">
          <option value="glm-5">GLM-5（智谱最强）</option>
          <option value="kimi-k2.5">Kimi K2.5（月之暗面）</option>
          <option value="deepseek-v3.2">DeepSeek V3.2</option>
          <option value="hy3-preview">Hy3 Preview（海螺AI）</option>
          <option value="deepseek-v4-pro">DeepSeek V4 Pro</option>
        </select>
      </div>

      <!-- 生成按钮 -->
      <button class="btn-generate" id="btnGenerate" onclick="generateSpeech()">
        <span class="spinner" id="spinner"></span>
        <i data-lucide="sparkles" style="width:16px;height:16px;"></i>
        <span id="btnText">生成演讲稿</span>
      </button>
    </div>


  </div>

  <!-- Right: Preview -->
  <div class="right-panel">
    <div class="card preview-card">
      <div class="preview-header">
        <div class="card-title" style="margin-bottom:0;"><i data-lucide="file-text"></i> 演讲稿预览</div>
        <div class="preview-actions" id="previewActions" style="display:none;">
          <button class="btn-action" onclick="copySpeech()"><i data-lucide="copy"></i> 复制</button>
          <button class="btn-action" onclick="downloadSpeech()"><i data-lucide="download"></i> .md</button>
          <button class="btn-action" onclick="downloadTxt()"><i data-lucide="file-text"></i> .txt</button>
        </div>
      </div>
      <div class="preview-content" id="previewContent">
        <div class="placeholder">
          <div class="placeholder-icon"><i data-lucide="mic"></i></div>
          <div class="placeholder-text">填写左侧参数后点击「生成演讲稿」<br>Skill引擎将基于石梅表达DNA自动生成</div>
        </div>
      </div>
      <div class="stats-bar" id="statsBar" style="display:none;">
        <div class="stat-item"><i data-lucide="type"></i> 字数：<span class="num" id="statWords">0</span></div>
        <div class="stat-item"><i data-lucide="clock"></i> 时长：<span class="num" id="statTime">0</span> 分钟</div>
      </div>
    </div>

    <!-- 交互修改面板 -->
    <div class="card modify-card" id="modifyCard" style="display:none;">
      <div class="card-title"><i data-lucide="message-square"></i> 交互修改</div>
      <div class="modify-chat" id="modifyChat"></div>

人才培养要从灌输走向自主建构，教与学要从单向走向协同，知识要从静态走向活水——这些方向，在座的大家都清楚，已经不需要再论证了。

今天真正的问题不是"要不要变"，而是**"怎么变"**。方向有了，路径在哪？谁来铺这条路？

作为科技公司，我们的回答很明确：用AI native的方式，来支撑这场范式变化。不是在旧系统上贴AI标签，是从底层重新设计。

下面我从三个方向讲LearnBuddy是怎么做的。

**第一，人才培养：AI native 意味着 1:1 不是理想，是工程问题**

传统的个性化教学为什么推不动？因为1:1师生比在物理世界不可能实现。这不是理念问题，是资源约束问题。

AI native的思路是：不要试图改变师生比，而是把"师"这个变量重新定义。一位教授的专家分身，可以同时陪100个学生学习，每个学生得到的都是基于教授方法论的个性化指导——7×24在线，课前规划方向，课中深度追问，课后归因沉淀。

这不是通用大模型套个提示词。教授本人参与共创、授权、校准，思维链可复现，对话有出处可迭代。区别在哪？通用大模型能回答问题，但不会启发你问下一个问题。专家分身能，因为它继承的是教授的认知路径，不只是知识库。

**第二，教与学：AI native 不是给老师减负，是重构教的边界**

"AI给老师减负"这句话说了很久了。但减负之后呢？批改少了，老师多出来的时间干什么？

AI native的回答是：不是减负，是重新划定人机分工的边界。分身做常驻的事——日常答疑、阶段反馈、文献检索、作业批改；教授做不可替代的事——开题定方向、评审把关、答辩检验、重大决策。

这意味着"教"的定义变了：从"每一个环节都亲力在场"，变成"关键节点出场，全程有分身接住"。教授的影响力从线性变成指数级，一个分身同时支撑双创、论文、竞赛多条线并发。

同样，"学"也变了：学生从"听完就忘"变成"边听边问、自主练习、错题归因"。课堂从单向讲授变成三元协同——老师设计教法，AI适配连接，学生主动建构。这不是在旧课堂上加AI辅助，是让课堂的交互结构本身发生变化。

**第三，知识构建：AI native 意味着知识是活的，不是存档**

不是把PPT存到云端就叫知识资产，那叫数字归档。AI native的知识构建，是让知识变成可对话、可迭代、可流动的活系统。

2. **课程资产**：PPT一键转AI互动课，不是静态录播，是学生能问能练的活课程
3. **Skills资产**：科研从选题到投稿7个阶段，沉淀为校内自主可控的可复用工具

三类资产形成知识网络——一位教授退休前，三十年方法论可以留给下一代师生继续用、继续迭代。知识不再是随人走的个人经验，而是沉淀在组织里的活资产。

伦理上，教授本人参与授权，每次对话有出处可追溯。这是AI native的前提，不是附加选项。

            preview.scrollTop = preview.scrollHeight;
          } else if (reasonDelta && !generatedText) {
            // 思考阶段：显示进度
            reasoningLen += reasonDelta.length;
            preview.innerHTML = `<p style="color:#94A3B8;text-align:center;margin-top:40px;">
              <span style="font-size:28px;">🧠</span><br><br>
              模型正在深度思考中...<br>
              <span style="font-size:12px;color:#64748B;">已思考 ${reasoningLen} 字，正文即将输出</span><br><br>
              <span style="font-size:11px;color:#475569;max-width:500px;display:inline-block;line-height:1.5;opacity:0.6;">${reasonDelta.length > 60 ? '...' + reasonDelta.slice(-60) : reasonDelta}</span>
            </p>`;
          }
        } catch (e) { /* skip malformed chunks */ }
      }
    }

    // Final render
    preview.innerHTML = formatSpeech(generatedText);
    updateStats(generatedText);
    document.getElementById('previewActions').style.display = 'flex';
    document.getElementById('statsBar').style.display = 'flex';
    document.getElementById('modifyCard').style.display = 'block';
    btnText.textContent = '重新生成';

  } catch (e) {
    if (e.name === 'AbortError') return;
    console.error('API Error:', e);
    const isCors = e.message.includes('Failed to fetch') || e.message.includes('NetworkError') || e.message.includes('CORS');
    const hint = isCors
      ? '<br><br>💡 <b>这是浏览器跨域限制（CORS）导致的。</b><br>请先运行代理服务器：<br><code style="background:#1E293B;padding:4px 8px;border-radius:4px;color:#A5D6FF;">node proxy-server.js</code><br>然后访问 <a href="http://localhost:3721" style="color:#818CF8;">http://localhost:3721</a>'
      : e.message.includes('401') ? '<br><br>💡 API Key 无效或已过期，请点击「配置 Key」重新设置'
      : e.message.includes('400') ? '<br><br>💡 请求参数有误，可能是所选模型不在您的账号权限内'
      : '';
    preview.innerHTML = `<p style="color:#EF4444;text-align:center;margin-top:40px;">⚠️ 生成失败<br><br><span style="font-size:13px;color:#94A3B8;">${e.message}</span>${hint}</p>`;
    btnText.textContent = '重试';
  } finally {
    btn.disabled = false;
    spinner.style.display = 'none';
    abortController = null;
  }
}

// ===================== Format Speech Text → HTML =====================
function formatSpeech(text) {
  let html = '';
  const lines = text.split('\n');
  for (const line of lines) {
    const trimmed = line.trim();
    if (!trimmed) {
      html += '<br>';
      continue;
    }
    // Bold markers
    let formatted = trimmed.replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>');
    // Detect bullet points
    if (/^[•·\-]\s/.test(trimmed) || /^\d+[\.、]\s?/.test(trimmed)) {
      html += `<p class="no-indent">${formatted}</p>`;
    } else if (trimmed.startsWith('---')) {
      html += '<div class="section-break">· · ·</div>';
    } else {
      html += `<p>${formatted}</p>`;
    }
  }
  return html;
}

// ===================== Stats =====================
function updateStats(text) {
  const words = text.replace(/[\s\n]/g, '').length;
  document.getElementById('statWords').textContent = words;
  document.getElementById('statTime').textContent = Math.round(words / 180);
}

}

// ===================== Interactive Modification =====================
let modifyHistory = [];  // Store modification conversation

function modifySpeech() {
  const modifyInput = document.getElementById('modifyInput');
  const requestText = modifyInput.value.trim();
  if (!requestText) return;

  const btn = document.getElementById('btnModify');
  const spinner = document.getElementById('spinnerModify');
  const modifyChat = document.getElementById('modifyChat');
  const preview = document.getElementById('previewContent');

  btn.disabled = true;
  spinner.style.display = 'inline-block';

  // Add user message to chat
  modifyChat.innerHTML += `<div class="modify-msg user"><div class="msg-label">修改要求</div>${requestText}</div>`;
  modifyChat.scrollTop = modifyChat.scrollHeight;

  // Clear input
  modifyInput.value = '';

  // Build modification prompt
  const modifyPrompt = `你是一位专业的演讲稿编辑助手。请根据以下修改要求，对演讲稿进行修改。

**当前演讲稿内容**：
${generatedText}

**修改要求**：
${requestText}

请直接输出修改后的完整演讲稿。保持石梅的表达风格和DNA，只修改用户要求的部分，其他部分保持不变。`;

  // Call API
  const cfg = MODEL_CONFIGS[currentModelId];
  const apiKey = ensureApiKey(currentModelId);
  if (!apiKey) { btn.disabled = false; spinner.style.display = 'none'; return; }

  const reqBody = {
    model: cfg.model,
    messages: [
      { role: 'system', content: SYSTEM_PROMPT },
      { role: 'user', content: modifyPrompt }
    ],
    stream: true,
    temperature: cfg.fixedTemp || 0.7,
    top_p: 0.9
  };
  if (!cfg.fixedTemp) reqBody.max_tokens = 4096;

  // Show assistant thinking message
  modifyChat.innerHTML += `<div class="modify-msg assistant" id="modifyResponse"><div class="msg-label">AI 修改</div><span style="color:#94A3B8;">正在修改中...</span></div>`;
  modifyChat.scrollTop = modifyChat.scrollHeight;

  // Adaptive proxy
  const PROXY_URL = 'http://localhost:3721/proxy';
  let newText = '';

  fetch(PROXY_URL, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({
      targetUrl: cfg.apiUrl,
      headers: { 'Authorization': 'Bearer ' + apiKey },
      body: JSON.stringify(reqBody)
    })
  })
  .then(response => {
    if (!response.ok) throw new Error('API请求失败: ' + response.status);
    const reader = response.body.getReader();
    const decoder = new TextDecoder();
    let buffer = '';

    function readStream() {
      return reader.read().then(({ done, value }) => {
        if (done) {
          // Update the speech
          generatedText = newText;
          preview.innerHTML = formatSpeech(generatedText);
          updateStats(generatedText);

          // Update the assistant message with final text
          const respEl = document.getElementById('modifyResponse');
          if (respEl) {
            respEl.innerHTML = `<div class="msg-label">AI 修改</div>已完成修改，请查看右侧更新后的演讲稿。`;
          }

          btn.disabled = false;
          spinner.style.display = 'none';
          return;
        }

        buffer += decoder.decode(value, { stream: true });
        const lines = buffer.split('\n');
        buffer = lines.pop() || '';

        for (const line of lines) {
          const trimmed = line.trim();
          if (!trimmed || !trimmed.startsWith('data:')) continue;
          const data = trimmed.slice(5).trim();
          if (data === '[DONE]') continue;

          try {
            const json = JSON.parse(data);
            const choice = json.choices?.[0];
            if (!choice) continue;
            const textDelta = choice.delta?.content;
            if (textDelta) {
              newText += textDelta;
            }
          } catch (e) { /* skip */ }
        }

        return readStream();
      });
    }

    return readStream();
  })
  .catch(err => {
    console.error('Modify Error:', err);
    const respEl = document.getElementById('modifyResponse');
    if (respEl) {
      respEl.innerHTML = `<div class="msg-label">AI 修改</div><span style="color:#EF4444;">修改失败: ${err.message}</span>`;
    }
    btn.disabled = false;
    spinner.style.display = 'none';
  });
}

// Allow Enter key to trigger modification
document.addEventListener('DOMContentLoaded', () => {
  const modifyInput = document.getElementById('modifyInput');
  if (modifyInput) {
    modifyInput.addEventListener('keydown', (e) => {
      if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        modifySpeech();
      }
    });
  }
});

document.addEventListener('DOMContentLoaded', () => lucide.createIcons());
